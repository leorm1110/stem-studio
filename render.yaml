# Render.com: New → Blueprint → incolla questo file (o collega il repo).
# Un solo servizio Web: apri l’URL che ti dà Render, senza Netlify separato.

services:
  - type: web
    name: stem-studio
    runtime: docker
    # Senza "plan" Render usa starter (~7 USD/mese). "free" = 0 USD con limiti (512MB RAM, sleep dopo inattività).
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DEMUCS_SHIFTS
        value: "10"
      # Opzionale (meglio come Secret nel dashboard Render): LALAL_LICENSE_KEY — separazione stem via LALAL.AI API v1
      # Opzionale: STEM_BACKEND_ORDER=lalal,demucs,demo — cloud prima (utile se Demucs non parte sul piano Free)
